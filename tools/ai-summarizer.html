<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free AI Text Summarizer | ToolzNest</title>
    <meta name="description" content="Instantly summarize long articles, essays, and text blocks into short, concise sentences for free.">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>if(localStorage.getItem('theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');</script>
    <style>
        .split-workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
        .textarea-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .textarea-box textarea {
            width: 100%;
            height: 300px;
            border: none;
            resize: none;
            background: transparent;
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.5;
        }
        .textarea-box textarea:focus {
            outline: none;
        }
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid var(--border-color);
            margin-top: 15px;
        }
        @media (max-width: 768px) {
            .split-workspace {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-content">
            <a href="../index.html" class="logo">Toolz<span class="highlight">nest</span></a>
            <ul class="nav-links">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#tools" class="active">Tools</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <div class="ad-slot" style="margin-top: 20px;">
            [AdSpace] Top Rectangle Ad
        </div>

        <div class="tool-page-header">
            <h1>Free AI Summarizer</h1>
            <p>Paste long articles and instantly get a bulleted or short paragraph summary reading.</p>
        </div>

        <div class="split-workspace tool-workspace">
            <div class="textarea-box">
                <textarea id="input-text" placeholder="Paste a long article here to summarize..."></textarea>
                <div class="action-bar">
                    <span class="text-muted" id="word-count">0 words</span>
                    <button class="btn btn-primary" id="process-btn">Summarize</button>
                </div>
            </div>
            
            <div class="textarea-box" style="background: var(--bg-color);">
                <textarea id="output-text" placeholder="Your summary will appear here..." readonly></textarea>
                <div class="action-bar">
                    <span class="text-muted" style="color:var(--success)">AI Ready</span>
                    <button class="btn btn-outline" id="copy-btn">Copy Summary</button>
                </div>
            </div>
        </div>

        <div class="ad-slot">
            [AdSpace] Bottom Rectangle Ad
        </div>
    </main>

    <script src="../js/main.js"></script>
    <script src="../js/ai-summarizer.js"></script>
</body>
</html>
